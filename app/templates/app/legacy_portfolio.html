{% extends 'base.html' %}
{% load static %}

{% block title %}
<title>Legacy Portfolio | Raw & Unwind Safaris</title>
{% endblock %}

{% block meta_description %}
<meta name="description" content="Explore unforgettable safari experiences across Kenya with Raw & Unwind Safaris.">
{% endblock %}

{% block content %}

<!-- HERO -->
<section class="relative w-full h-[50vh] overflow-hidden">

    <div class="absolute inset-0">
        <img src="{% static 'images/blogs/2.webp' %}" class="w-full h-full object-cover" />
    </div>

    <div class="absolute inset-0 bg-black/50"></div>

    <div class="relative z-10 h-full flex items-center justify-center text-center px-6">
        <div>
            <h1 class="text-4xl lg:text-6xl font-bold text-white mb-4">
                Legacy Portfolio
            </h1>
            <p class="text-lg text-gray-200">
                Explore Kenya Safaris | Luxury Experiences
            </p>
        </div>
    </div>

</section>

<!-- PORTFOLIO -->
<section class="w-full px-6 py-20">
    <div class="max-w-7xl mx-auto">

        <!-- Spinner -->
        <div id="spinner" class="flex justify-center mb-10">
            <div class="w-12 h-12 border-4 border-green-700 border-t-transparent rounded-full animate-spin"></div>
        </div>

        <!-- GRID -->
        <div id="grid" class="hidden grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        </div>

    </div>
</section>

<script>
    document.addEventListener("DOMContentLoaded", () => {

        const spinner = document.getElementById("spinner");
        const grid = document.getElementById("grid");
        const placeholder = "{% static 'images/placeholder.png' %}";

        fetch("/api/legacy-portfolio/")
            .then(res => res.json())
            .then(data => {

                const items = data.portfolios || data;

                spinner.style.display = "none";
                grid.classList.remove("hidden");

                if (!items.length) {
                    grid.innerHTML = `
                    <p class="col-span-full text-center text-gray-500">
                        No portfolio available.
                    </p>
                `;
                    return;
                }

                grid.innerHTML = items.map(item => `
                
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-lg transition duration-300 flex flex-col">

                    <!-- IMAGE -->
                    <div class="overflow-hidden">
                        <img src="${item.image || placeholder}"
                             class="w-full h-44 object-cover hover:scale-105 transition duration-500">
                    </div>

                    <!-- CONTENT -->
                    <div class="p-5 flex flex-col flex-1">

                        <h3 class="text-lg font-bold text-[#1a4d2e] mb-2">
                            ${item.title}
                        </h3>

                        <p class="text-sm text-gray-600 mb-4 flex-grow">
                            ${(item.content || "").substring(0, 90)}...
                        </p>

                        <!-- FOOTER -->
                        <div class="flex items-center justify-between mt-auto">

                            <span class="text-lg font-bold text-[#1a4d2e]">
                                ${item.currency} ${item.price}
                            </span>

                            <a href="${item.url}"
                               class="text-sm font-semibold text-green-800 flex items-center gap-1 hover:gap-2 transition-all">
                                View
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2"
                                     viewBox="0 0 24 24">
                                    <path d="M5 12h14M12 5l7 7-7 7"/>
                                </svg>
                            </a>

                        </div>

                    </div>

                </div>

            `).join("");

            })
            .catch(err => {
                spinner.style.display = "none";
                grid.classList.remove("hidden");
                grid.innerHTML = `
                <p class="col-span-full text-center text-red-500">
                    Failed to load data.
                </p>
            `;
                console.error(err);
            });

    });
</script>

{% endblock %}
