  :root {
    --obsidian: #1a1714;
    --earth: #272118;
    --bark: #5c4a3a;
    --clay: #8b6355;
    --amber: #c4996a;
    --gold: #c9a84c;
    --gold-dim: #c9a84c1f;
    --gold-border: #c9a84c47;
    --gold-mid: #c9a84c73;
    --ivory: #f5f0e8;
    --ivory-dim: #f5f0e88c;
    --ivory-faint: #f5f0e81a;
    --sage: #8a9e7a;
    --sage-dim: #8a9e7a33;
    --smoke: #f5f0e80d
  }

  *,
  :before,
  :after {
    box-sizing: border-box;
    margin: 0;
    padding: 0
  }

  html {
    scroll-behavior: smooth;
    font-size: 16px
  }

  body {
    background: var(--obsidian);
    color: var(--ivory);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-family: DM Sans, sans-serif;
    font-weight: 300;
    overflow-x: hidden
  }

  .t-display {
    letter-spacing: .18em;
    text-transform: uppercase;
    font-family: Cinzel, serif;
    font-weight: 700;
    line-height: .95
  }

  .t-headline {
    letter-spacing: .12em;
    text-transform: uppercase;
    font-family: Cinzel, serif;
    font-weight: 600
  }

  .t-headline-light {
    letter-spacing: .1em;
    text-transform: uppercase;
    font-family: Cinzel, serif;
    font-weight: 400
  }

  .t-serif {
    font-family: Cormorant Garamond, serif;
    font-style: italic;
    font-weight: 300
  }

  .t-serif-up {
    font-family: Cormorant Garamond, serif;
    font-style: italic;
    font-weight: 500
  }

  .t-label {
    letter-spacing: .22em;
    text-transform: uppercase;
    font-family: DM Sans, sans-serif;
    font-size: .65rem;
    font-weight: 500
  }

  .t-body {
    font-family: DM Sans, sans-serif;
    font-size: .92rem;
    font-weight: 300;
    line-height: 1.75
  }

  .container {
    max-width: 1360px;
    margin: 0 auto;
    padding: 0 72px
  }

  @media (width<=900px) {
    .container {
      padding: 0 24px
    }
  }

  .section {
    padding: 120px 0
  }

  .section-sm {
    padding: 80px 0
  }

  body:before {
    content: "";
    opacity: .45;
    pointer-events: none;
    z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
    position: fixed;
    inset: 0
  }

  .reveal {
    opacity: 0;
    transition: opacity .8s cubic-bezier(.16, 1, .3, 1), transform .8s cubic-bezier(.16, 1, .3, 1);
    transform: translateY(28px)
  }

  .reveal.visible {
    opacity: 1;
    transform: translateY(0)
  }

  .reveal-d1 {
    transition-delay: .1s
  }

  .reveal-d2 {
    transition-delay: .2s
  }

  .reveal-d3 {
    transition-delay: .3s
  }

  .reveal-d4 {
    transition-delay: .4s
  }

  .reveal-d5 {
    transition-delay: .5s
  }

  .gold-rule {
    background: linear-gradient(90deg, transparent, var(--gold-border), transparent);
    width: 100%;
    height: 1px
  }

  .gold-rule-left {
    background: linear-gradient(90deg, var(--gold-mid), var(--gold-dim), transparent);
    width: 100%;
    height: 1px
  }

  .card-dark {
    background: var(--earth);
    border: 1px solid #f5f0e812;
    transition: border-color .3s, transform .3s cubic-bezier(.16, 1, .3, 1);
    position: relative;
    overflow: hidden
  }

  .card-dark:hover {
    border-color: var(--gold-border);
    transform: translateY(-4px)
  }

  .nav {
    z-index: 100;
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--gold-dim);
    background: #1a1714eb;
    position: fixed;
    top: 0;
    left: 0;
    right: 0
  }

  .nav-inner {
    justify-content: space-between;
    align-items: center;
    height: 64px;
    padding: 0 48px;
    display: flex
  }

  .nav-logo {
    letter-spacing: .28em;
    color: var(--gold);
    font-family: Cinzel, serif;
    font-size: .82rem;
    font-weight: 600;
    text-decoration: none
  }

  .nav-links {
    align-items: center;
    gap: 36px;
    list-style: none;
    display: flex
  }

  .nav-link {
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--ivory-dim);
    font-family: DM Sans, sans-serif;
    font-size: .68rem;
    font-weight: 400;
    text-decoration: none;
    transition: color .2s
  }

  .nav-link:hover,
  .nav-link.active {
    color: var(--gold)
  }

  .nav-cta {
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--obsidian);
    background: var(--gold);
    cursor: pointer;
    border: none;
    padding: 10px 20px;
    font-family: Cinzel, serif;
    font-size: .62rem;
    font-weight: 600;
    transition: background .2s, transform .2s
  }

  .nav-cta:hover {
    background: var(--amber);
    transform: translateY(-1px)
  }

  .hero {
    grid-template-columns: 1fr 1fr;
    align-items: center;
    min-height: 100vh;
    padding-top: 64px;
    display: grid;
    position: relative;
    overflow: hidden
  }

  .hero-bg-pattern {
    background: radial-gradient(60% 50% at 80%, #c9a84c0a 0%, #0000 70%), radial-gradient(40% 60% at 20% 80%, #8a9e7a08 0%, #0000 60%);
    position: absolute;
    inset: 0
  }

  .hero-left {
    z-index: 2;
    padding: 80px 0 80px 72px;
    position: relative
  }

  .hero-badge {
    border: 1px solid var(--gold-border);
    align-items: center;
    gap: 8px;
    margin-bottom: 40px;
    padding: 6px 14px;
    display: inline-flex
  }

  .hero-badge-dot {
    background: var(--sage);
    border-radius: 50%;
    width: 6px;
    height: 6px;
    animation: 2.5s ease-in-out infinite pulse
  }

  @keyframes pulse {

    0%,
    to {
      opacity: 1;
      transform: scale(1)
    }

    50% {
      opacity: .5;
      transform: scale(.7)
    }
  }

  .hero-display-word {
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--ivory);
    font-family: Cinzel, serif;
    font-weight: 700;
    line-height: .9;
    display: block
  }

  .hero-display-word.accent {
    color: var(--gold)
  }

  .hero-divider {
    background: var(--gold);
    width: 80px;
    height: 1px;
    margin: 32px 0
  }

  .hero-stats {
    gap: 48px;
    margin-top: 52px;
    display: flex
  }

  .hero-stat-num {
    color: var(--gold);
    letter-spacing: .05em;
    font-family: Cinzel, serif;
    font-size: 1.6rem;
    font-weight: 600;
    display: block
  }

  .hero-stat-label {
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--ivory-dim);
    margin-top: 4px;
    font-family: DM Sans, sans-serif;
    font-size: .62rem;
    display: block
  }

  .hero-right {
    z-index: 2;
    justify-content: center;
    align-items: center;
    height: 100%;
    display: flex;
    position: relative
  }

  .kenya-map-svg {
    opacity: .8;
    width: 340px;
    height: 380px
  }

  .kenya-outline {
    fill: none;
    stroke: var(--gold-border);
    stroke-width: 1.5px;
    transition: stroke .3s
  }

  .kenya-fill {
    fill: #c9a84c0a
  }

  .kenya-dot {
    fill: var(--gold);
    r: 3;
    transition: r .3s
  }

  .kenya-dot:hover {
    r: 5
  }

  .kenya-dot-label {
    fill: var(--ivory-dim);
    letter-spacing: .1em;
    font-family: DM Sans, sans-serif;
    font-size: 8px
  }

  .section-eyebrow {
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
    display: flex
  }

  .section-eyebrow:before {
    content: "";
    background: var(--gold);
    width: 32px;
    height: 1px
  }

  .geo-grid {
    background: var(--gold-dim);
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    margin-top: 60px;
    display: grid
  }

  @media (width<=900px) {
    .geo-grid {
      grid-template-columns: 1fr
    }
  }

  .geo-card {
    background: var(--earth);
    cursor: default;
    padding: 40px 36px;
    transition: background .3s;
    position: relative;
    overflow: hidden
  }

  .geo-card:hover {
    background: #2a231c
  }

  .geo-card-num {
    color: #f5f0e80a;
    letter-spacing: .05em;
    pointer-events: none;
    font-family: Cinzel, serif;
    font-size: 4rem;
    font-weight: 700;
    line-height: 1;
    position: absolute;
    top: 16px;

  .geo-region {
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--ivory);
    margin-bottom: 4px;
    font-family: Cinzel, serif;
    font-size: .82rem;
    font-weight: 600
  }

  .geo-subtitle {
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ivory-dim);
    margin-bottom: 16px;
    font-family: DM Sans, sans-serif;
    font-size: .65rem
  }

  .geo-desc {
    color: var(--ivory-dim);
    margin-bottom: 20px;
    font-family: Cormorant Garamond, serif;
    font-size: 1.05rem;
    font-style: italic;
    font-weight: 300;
    line-height: 1.6
  }

  .geo-destinations {
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
    display: flex
  }

  .geo-dest-pill {
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ivory-dim);
    border: 1px solid #f5f0e81f;
    padding: 3px 8px;
    font-family: DM Sans, sans-serif;
    font-size: .62rem
  }

  .geo-transport {
    margin-top: 16px
  }

  .geo-transport-item {
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    display: flex
  }

  .geo-transport-name {
    color: var(--ivory-dim);
    font-family: DM Sans, sans-serif;
    font-size: .7rem
  }

  .geo-carbon-bar {
    background: #f5f0e81a;
    flex: 1;
    height: 2px;
    margin: 0 12px;
    position: relative
  }

  .geo-carbon-fill {
    border-radius: 1px;
    transition: width 1s cubic-bezier(.16, 1, .3, 1);
    position: absolute;
    top: 0;
    bottom: 0;
    left: 0
  }

  .geo-carbon-label {
    letter-spacing: .08em;
    text-transform: uppercase;
    text-align: right;
    min-width: 36px;
    font-family: DM Sans, sans-serif;
    font-size: .6rem
  }

  .carbon-grid {
    grid-template-columns: 1fr 1fr;
    align-items: start;
    gap: 80px;
    margin-top: 60px;
    display: grid
  }

  @media (width<=900px) {

      grid-template-columns: 1fr;
      gap: 48px
    }
  }

  .carbon-step {
    border-bottom: 1px solid var(--ivory-faint);
    gap: 24px;
    padding: 28px 0;
    display: flex;
    position: relative
  }

  .carbon-step:last-child {
    border-bottom: none
  }

  .carbon-step-num {
    letter-spacing: .2em;
    color: var(--gold);
    min-width: 36px;
    padding-top: 4px;
    font-family: Cinzel, serif;
    font-size: .65rem
  }

  .carbon-step-title {
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ivory);
    margin-bottom: 8px;
    font-family: Cinzel, serif;
    font-size: .78rem;
    font-weight: 600
  }

  .carbon-step-body {
    color: var(--ivory-dim);
    font-family: DM Sans, sans-serif;
    font-size: .88rem;
    font-weight: 300;
    line-height: 1.7
  }

  .carbon-calc {
    background: var(--earth);
    border: 1px solid var(--gold-dim);
    padding: 40px;
    position: sticky;
    top: 90px
  }

  .calc-title {
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 32px;
    font-family: Cinzel, serif;
    font-size: .75rem;
    font-weight: 600
  }

  .calc-field {
    margin-bottom: 24px
  }

  .calc-label {
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--ivory-dim);
    margin-bottom: 10px;
    font-family: DM Sans, sans-serif;
    font-size: .65rem;
    display: block
  }

  .calc-slider-wrap {
    align-items: center;
    gap: 12px;
    display: flex
  }

  .calc-slider {
    -webkit-appearance: none;
    cursor: pointer;
    background: #f5f0e826;
    outline: none;
    flex: 1;
    height: 1px
  }

  .calc-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    background: var(--gold);
    cursor: pointer;
    border: 2px solid var(--obsidian);
    width: 14px;
    height: 14px;
    box-shadow: 0 0 0 1px var(--gold);
    border-radius: 50%
  }

  .calc-val {
    color: var(--gold);
    text-align: right;
    min-width: 32px;
    font-family: Cinzel, serif;
    font-size: .85rem
  }

  .calc-toggle {
    gap: 0;
    display: flex
  }

  .calc-toggle-btn {
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ivory-dim);
    cursor: pointer;
    background: 0 0;
    border: 1px solid #f5f0e81f;
    flex: 1;
    padding: 10px;
    font-family: DM Sans, sans-serif;
    font-size: .65rem;
    transition: all .2s
  }

  .calc-toggle-btn.active {
    background: var(--gold-dim);
    border-color: var(--gold-border);
    color: var(--gold)
  }

  .calc-select {
    width: 100%;
    color: var(--ivory);
    cursor: pointer;
    background: #f5f0e80d;
    border: 1px solid #f5f0e81f;
    outline: none;
    padding: 10px 14px;
    font-family: DM Sans, sans-serif;
    font-size: .8rem
  }

    border-top: 1px solid var(--gold-dim);
    margin-top: 28px;
    padding-top: 28px
  }

  .calc-result-big {
    color: var(--gold);
    font-family: Cinzel, serif;
    font-size: 2.5rem;
    font-weight: 600;
    line-height: 1
  }

  .calc-result-unit {
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--ivory-dim);
    margin-top: 4px;
    font-family: DM Sans, sans-serif;
    font-size: .65rem
  }

  .calc-result-sub {
    color: var(--ivory-dim);
    margin-top: 12px;
    font-family: Cormorant Garamond, serif;
    font-size: .95rem;
    font-style: italic
  }

  .calc-cta {
    background: var(--gold);
    letter-spacing: .2em;
    text-transform: uppercase;
    width: 100%;
    color: var(--obsidian);
    cursor: pointer;
    border: none;
    margin-top: 20px;
    padding: 14px;
    font-family: Cinzel, serif;
    font-size: .65rem;
    font-weight: 600;
    transition: background .2s, transform .2s
  }

  .calc-cta:hover {
    background: var(--amber);
    transform: translateY(-2px)
  }

  .tiers-grid {
    background: #f5f0e80f;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    margin-top: 60px;
    display: grid
  }

  @media (width<=900px) {
    .tiers-grid {
      grid-template-columns: 1fr
    }
  }

  .tier-card {
    background: var(--earth);
    padding: 52px 40px;
    transition: background .3s;
    position: relative;
    overflow: hidden
  }

  .tier-card:hover {
    background: #2a231c
  }

  .tier-card:before {
    content: "";
    height: 2px;
    position: absolute;
    top: 0;
    left: 0;
    right: 0
  }

  .tier-card.sovereign:before {
    background: var(--gold)
  }

  .tier-card.corporate:before {
    background: var(--ivory-dim)
  }

  .tier-card.akiba:before {
    background: var(--sage)
  }

  .tier-badge {
    letter-spacing: .25em;
    text-transform: uppercase;
    border: 1px solid;
    margin-bottom: 24px;
    padding: 4px 10px;
    font-family: DM Sans, sans-serif;
    font-size: .6rem;
    display: inline-block
  }

  .tier-badge.sovereign {
    color: var(--gold);
    border-color: var(--gold-border);
    background: var(--gold-dim)
  }

  .tier-badge.corporate {
    color: var(--ivory-dim);
    background: var(--ivory-faint);
    border-color: #f5f0e833
  }

  .tier-badge.akiba {
    color: var(--sage);
    border-color: var(--sage-dim);
    background: #8a9e7a1a
  }

  .tier-name {
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ivory);
    margin-bottom: 8px;
    font-family: Cinzel, serif;
    font-size: 1.15rem;
    font-weight: 600
  }

    color: var(--ivory-dim);

    font-style: italic;
    font-weight: 300;
    line-height: 1.5
  }

  .tier-features {
    margin-bottom: 32px;
    list-style: none
  }

  .tier-feature {
    color: var(--ivory-dim);
    border-bottom: 1px solid var(--ivory-faint);
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    font-family: DM Sans, sans-serif;
    font-size: .78rem;
    display: flex
  }

  .tier-feature:before {
    content: "—";
    color: var(--gold);
    flex-shrink: 0
  }

  .tier-feature:last-child {
    border-bottom: none
  }

  .tier-price {
    letter-spacing: .15em;
    margin-top: auto;
    font-family: Cinzel, serif;
    font-size: .75rem
  }

  .tier-price-num {
    font-size: 1.4rem;
    font-weight: 600
  }

  .tier-cta {
    letter-spacing: .22em;
    text-transform: uppercase;
    cursor: pointer;
    background: 0 0;
    border: 1px solid;
    width: 100%;
    margin-top: 24px;
    padding: 13px;
    font-family: Cinzel, serif;
    font-size: .6rem;
    font-weight: 600;
    transition: all .2s
  }

  .tier-cta.sovereign {
    color: var(--gold);
    border-color: var(--gold-border)
  }

  .tier-cta.sovereign:hover {
    background: var(--gold);
    color: var(--obsidian)
  }

  .tier-cta.corporate {
    color: var(--ivory-dim);
    border-color: #f5f0e833
  }

  .tier-cta.corporate:hover {
    background: var(--ivory-dim);
    color: var(--obsidian)
  }

  .tier-cta.akiba {
    color: var(--sage);
    border-color: var(--sage-dim)
  }

  .tier-cta.akiba:hover {
    background: var(--sage);
    color: var(--obsidian)
  }

  .partner-block {
    border-top: 1px solid var(--gold-dim);
    grid-template-columns: 1fr 2fr;
    gap: 0;
    padding: 64px 0;
    display: grid
  }

  .partner-block:last-child {
    border-bottom: 1px solid var(--gold-dim)
  }

  @media (width<=900px) {
    .partner-block {
      grid-template-columns: 1fr;
      gap: 32px
    }
  }

  .partner-left {
    padding-right: 60px
  }

  .partner-type-badge {
    letter-spacing: .22em;
    text-transform: uppercase;
    border: 1px solid;
    margin-bottom: 20px;
    padding: 4px 10px;
    font-family: DM Sans, sans-serif;
    font-size: .6rem;
    display: inline-block
  }

  .partner-name {
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ivory);
    margin-bottom: 8px;
    font-family: Cinzel, serif;
    font-size: 1.4rem;
    font-weight: 600;
    line-height: 1.1
  }

  .partner-tagline {
    color: var(--ivory-dim);
    margin-bottom: 16px;
    font-family: Cormorant Garamond, serif;
    font-size: 1.1rem;
    font-style: italic
  }

  .partner-location {
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--ivory-dim);
    font-family: DM Sans, sans-serif;
    font-size: .65rem
  }

  .partner-desc {
    color: var(--ivory-dim);
    margin-bottom: 28px;
    font-family: DM Sans, sans-serif;
    font-size: .92rem;
    font-weight: 300;
    line-height: 1.75
  }

  .partner-impact {
    background: var(--earth);
    border-left: 2px solid;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
    display: flex
  }

  .partner-impact-num {
    white-space: nowrap;
    font-family: Cinzel, serif;
    font-size: 1.5rem;
    font-weight: 600
  }

  .partner-impact-label {
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--ivory-dim);
    font-family: DM Sans, sans-serif;
    font-size: .7rem;
    line-height: 1.4
  }

  .partner-cert {
    align-items: center;
    gap: 8px;
    margin-top: 16px;
    display: flex
  }

  .partner-cert-dot {
    border-radius: 50%;
    flex-shrink: 0;
    width: 6px;
    height: 6px
  }

  .partner-cert-text {
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ivory-dim);
    font-family: DM Sans, sans-serif;
    font-size: .65rem
  }

  .impact-section {
    background: var(--earth);
    border-top: 1px solid var(--gold-dim);
    padding: 140px 0;
    position: relative;
    overflow: hidden
  }

  .impact-bg {
    pointer-events: none;
    background: radial-gradient(70% 60%, #c9a84c0f 0%, #0000 70%);
    position: absolute;
    inset: 0
  }

  .impact-choices {
    background: var(--gold-dim);
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    margin: 60px 0;
    display: grid
  }

  @media (width<=900px) {
    .impact-choices {
      grid-template-columns: 1fr
    }
  }

  .impact-choice {
    background: var(--earth);
    cursor: pointer;
    padding: 32px 28px;
    transition: all .25s;
    position: relative
  }

  .impact-choice:hover,
  .impact-choice.selected {
    background: #c9a84c12
  }

  .impact-choice.selected:before {
    content: "";
    background: var(--gold);
    height: 2px;
    position: absolute;
    top: 0;
    left: 0;
    right: 0
  }

  .impact-choice-name {
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--ivory);
    margin-bottom: 8px;
    font-family: Cinzel, serif;
    font-size: .85rem;
    font-weight: 600
  }

  .impact-choice-sub {
    color: var(--ivory-dim);
    font-family: DM Sans, sans-serif;
    font-size: .75rem;
    line-height: 1.6
  }

  .impact-choice-radio {
    border: 1px solid #f5f0e833;
    border-radius: 50%;
    justify-content: center;
    align-items: center;
    width: 16px;
    height: 16px;
    transition: border-color .2s;
    display: flex;
    position: absolute;
    top: 24px;
    right: 24px
  }

  .impact-choice.selected .impact-choice-radio {
    border-color: var(--gold)
  }

  .impact-choice-radio:after {
    content: "";
    background: var(--gold);
    opacity: 0;
    border-radius: 50%;
    width: 7px;
    height: 7px;
    transition: opacity .2s
  }

  .impact-choice.selected .impact-choice-radio:after {
    opacity: 1
  }

  .impact-cta-wrap {
    text-align: center
  }

  .impact-btn {
    background: var(--gold);
    letter-spacing: .28em;
    text-transform: uppercase;
    color: var(--obsidian);
    cursor: pointer;
    border: none;
    padding: 20px 56px;
    font-family: Cinzel, serif;
    font-size: .72rem;
    font-weight: 700;
    transition: transform .3s cubic-bezier(.16, 1, .3, 1);
    display: inline-block;
    position: relative;
    overflow: hidden
  }

  .impact-btn:hover {
    transform: translateY(-3px)
  }

  .impact-btn:before {
    content: "";
    background: linear-gradient(90deg, #0000, #ffffff4d, #0000);
    width: 50%;
    height: 100%;
    animation: 2.5s ease-in-out infinite shimmer;
    position: absolute;
    top: 0;
    left: -100%
  }

  @keyframes shimmer {
    0% {
      left: -100%
    }

    50%,
    to {
      left: 150%
    }
  }

  .impact-note {
    color: var(--ivory-dim);
    margin-top: 16px;
    font-family: Cormorant Garamond, serif;
    font-size: .9rem;
    font-style: italic
  }

  .footer {
    border-top: 1px solid var(--gold-dim);
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    padding: 40px 72px;
    display: flex
  }

  .footer-logo {
    letter-spacing: .3em;
    color: var(--gold);
    font-family: Cinzel, serif;
    font-size: .78rem;
    font-weight: 600
  }

  .footer-text {
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #f5f0e84d;
    font-family: DM Sans, sans-serif;
    font-size: .62rem
  }

  ::-webkit-scrollbar {
    width: 4px
  }

  ::-webkit-scrollbar-track {
    background: var(--obsidian)
  }

  ::-webkit-scrollbar-thumb {
    background: var(--gold-dim)
  }

  ::-webkit-scrollbar-thumb:hover {
    background: var(--gold-border)
  }
</style>
